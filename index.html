<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحليل الصراعات - الإستراتيجية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0b0f1a; font-family: 'Inter', sans-serif; color: #e2e8f0; }
        .card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-gray-800 pb-6">
            <div>
                <h1 class="text-3xl font-bold text-white tracking-tight">Strategic Dashboard</h1>
                <p class="text-gray-400">تحليل التصعيد العسكري - تحديث مباشر</p>
            </div>
            <div id="status" class="px-4 py-1 rounded-full bg-green-500/10 text-green-500 text-sm border border-green-500/20">متصل بالقاعدة</div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="card p-6 rounded-2xl">
                <p class="text-gray-400 text-sm mb-1">مؤشر التصعيد</p>
                <h2 id="esc-rate" class="text-5xl font-bold text-red-500">--%</h2>
            </div>
            <div class="card p-6 rounded-2xl">
                <p class="text-gray-400 text-sm mb-1">توقعات الاستمرار</p>
                <h2 id="war-duration" class="text-5xl font-bold text-blue-500">-- يوم</h2>
            </div>
            <div class="card p-6 rounded-2xl">
                <p class="text-gray-400 text-sm mb-1">مستوى التهديد</p>
                <h2 id="trend" class="text-3xl font-bold text-yellow-500">جاري التحليل</h2>
            </div>
        </div>

        <div class="card p-6 rounded-2xl">
            <h3 class="text-xl font-bold mb-6 border-r-4 border-red-600 pr-4">آخر التطورات الميدانية</h3>
            <ul id="news-list" class="space-y-4">
                <li class="animate-pulse text-gray-600">انتظار البيانات...</li>
            </ul>
        </div>
    </div>

    <script>
        async function fetchData() {
            try {
                const r = await fetch('/api/dashboard');
                const d = await r.json();
                document.getElementById('esc-rate').innerText = d.military_escalation + '%';
                document.getElementById('war-duration').innerText = d.war_duration + ' يوم';
                document.getElementById('trend').innerText = d.military_trend;
                
                const list = document.getElementById('news-list');
                list.innerHTML = d.official_news.map(n => `
                    <li class="bg-gray-800/50 p-4 rounded-xl border border-gray-700 hover:border-red-500/50 transition-all">
                        ${n.content}
                    </li>
                `).join('');
            } catch (e) {
                document.getElementById('status').innerText = "خطأ في الاتصال";
                document.getElementById('status').className = "px-4 py-1 rounded-full bg-red-500/10 text-red-500 text-sm border border-red-500/20";
            }
        }
        fetchData();
    </script>
</body>
</html>
