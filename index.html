<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة المتابعة الإستراتيجية</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans">
    <div class="max-w-4xl mx-auto p-8">
        <h1 class="text-3xl font-bold mb-8 border-b border-slate-700 pb-4">مؤشرات التصعيد الإقليمي</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                <h3 class="text-slate-400 text-sm mb-2">نسبة التصعيد العسكري</h3>
                <div id="esc-rate" class="text-4xl font-bold text-red-500">تحميل...</div>
            </div>
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
                <h3 class="text-slate-400 text-sm mb-2">توقعات استمرار العمليات</h3>
                <div id="war-duration" class="text-4xl font-bold text-blue-400">تحميل...</div>
            </div>
        </div>

        <div class="bg-slate-800 p-6 rounded-xl border border-slate-700">
            <h3 class="text-xl font-bold mb-4">آخر الأخبار الرسمية</h3>
            <ul id="news-list" class="space-y-4">
                <li class="text-slate-500">جاري جلب البيانات...</li>
            </ul>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const res = await fetch('/api/dashboard');
                const data = await res.json();
                document.getElementById('esc-rate').innerText = data.military_escalation + '%';
                document.getElementById('war-duration').innerText = data.war_duration + ' يوم';
                
                const list = document.getElementById('news-list');
                list.innerHTML = data.official_news.map(n => 
                    `<li class="border-r-4 border-red-600 pr-4 bg-slate-700/50 p-3 rounded">${n.content}</li>`
                ).join('');
            } catch (e) {
                console.error("Error:", e);
                document.getElementById('esc-rate').innerText = "خطأ في الاتصال";
            }
        }
        loadData();
    </script>
</body>
</html>
